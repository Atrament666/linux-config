###############################################################################
# ceerious i3 status config
# see "man i3status" for documentation.
#
# It is important that this file is edited as UTF-8.
# The following line should contain a sharp s:
# ß
# If the above line is not correctly displayed, fix your editor first!
###############################################################################

general {
	interval 		= 1
		colors 			= true
		color_good      = '#88b090'
		color_degraded  = '#ccdc90'
		color_bad       = '#e89393'
}

order += "svatky"
order += "myweather plymouth"
order += "group rates"
order += "group frames"
order += "audiosink"
order += "tztime local"


group rates {
	cycle = 10
		format = '{output}'
		czk_rate "gbp"{
			code = 'GBP'
		}

	czk_rate "usd" {
		code = 'USD'
	}
}

group frames {
	click_mode = "button"
		color = '#fffb0f'

		format_button_closed = "[Disks]"
		format_button_open = ">"
		frame disks {
			initial = "closed"
				disk "/home" {
					format = "home: %avail free "
						prefix_type	= custom
						threshold_type = percentage_avail
						on_click 1 = "exec thunar ~"
				}

			disk "/mnt/data" {
				format = "data: %avail free "
					prefix_type	= custom
					threshold_type = percentage_avail
					on_click 1 = "exec thunar /mnt/data"
			}
		}
}
myimap atrament666 {
	cache_timeout = 10
		imap_server = 'imap.gmail.com'
		mailbox = 'INBOX'
		port = 993
		password_file = '/home/atrament/.i3/imap_password.gpg'
		user = 'atrament666'
		format = "| Osobní ✉: {unseen} |"
		hide_if_zero = true
}

myimap machat_v {
	cache_timeout = 10
		imap_server = 'imap.gmail.com'
		mailbox = 'INBOX'
		port = 993
		password_file = '/home/atrament/.i3/imap_password.gpg'
		user = 'machat.v'
		format = "| Pracovní ✉: {unseen} |"
		hide_if_zero = true 
}

tztime local {
	format = " %A %e. %B | %H:%M:%S |"
}

myweather plymouth {
	color = '#0f8fff'
		city = "Plymouth,GB"
		api_key = '66eb01b63c27840ab769e63036731384'
		units = 'metric'
}

audiosink {
      display_name_mapping = {"GP106 High Definition Audio Controller Digital Stereo (HDMI)":"Headphones", "Starship/Matisse HD Audio Controller Pro":"LG Display"}
      format = "Output: {audiosink}"
      }
